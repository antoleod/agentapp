<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Evaluation App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">AE</div>
      <div>
        <h1>Agent Evaluation</h1>
        <p>ServiceNow Evaluation Helper</p>
      </div>
    </div>

    <button class="nav active" data-screen="formScreen">Form</button>
    <button class="nav" data-screen="databaseScreen">Database</button>
    <button class="nav" data-screen="reportsScreen">Reports</button>
    <button class="nav" data-screen="settingsScreen">Settings</button>
  </aside>

  <main class="app">
    <section id="formScreen" class="screen active">
      <div class="topbar">
        <h2>Evaluation Form</h2>
        <button type="button" id="pasteSnowBtn" class="secondary">Paste ServiceNow Info</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>
      <form id="evaluationForm" class="card form-grid">
        <label>Ticket Number
          <input id="ticketNumber" required placeholder="INC / RITM / REQ..." />
        </label>

        <label>Agent Name
          <input id="agentName" required placeholder="Agent name" />
        </label>

        <label>Evaluation Date
          <input id="evaluationDate" type="date" required />
        </label>

        <label>SLA Breach
          <select id="slaBreach">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </label>

        <label>LSA
          <input id="lsa" placeholder="LSA / Support area" />
        </label>

        <label>Assigned To
          <input id="assignedTo" placeholder="Assigned technician" />
        </label>

        <label>Asset Tracking
          <select id="assetTracking"></select>
        </label>

        <label>Planning Compliance
          <select id="planningCompliance"></select>
        </label>

        <label>Knowledge Base Compliance
          <select id="kbCompliance"></select>
        </label>

        <label>Team Spirit
          <select id="teamSpirit"></select>
        </label>

        <label>Dress Code
          <select id="dressCode"></select>
        </label>

        <label>Customer Oriented
          <select id="customerOriented"></select>
        </label>

        <label>Evaluated By
          <input id="evaluatedBy" placeholder="Your name" />
        </label>

        <label class="full">Comments
          <textarea id="comments" rows="4" placeholder="Notes, details, follow-up..."></textarea>
        </label>

        <div class="actions full">
          <button type="submit">Save Evaluation</button>
          <button type="button" id="searchLocalBtn" class="secondary">Search Saved Ticket</button>
          <button type="button" id="openSnowBtn" class="secondary">Open ServiceNow</button>
        </div>
      </form>
    </section>

    <section id="databaseScreen" class="screen">
      <div class="topbar">
        <h2>Database</h2>
        <div class="toolbar">
          <input id="searchInput" placeholder="Search ticket, agent, LSA..." />
          <button id="exportJsonBtn" class="secondary">Export JSON</button>
          <label class="upload secondary">Import JSON<input id="importJsonInput" type="file" accept=".json" hidden /></label>
          <button id="deleteAllBtn" class="danger">Delete All</button>
        </div>
      </div>

      <div class="card table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ticket</th>
              <th>Agent</th>
              <th>Date</th>
              <th>SLA</th>
              <th>LSA</th>
              <th>Assigned To</th>
              <th>Average</th>
              <th>Evaluated By</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="databaseBody"></tbody>
        </table>
      </div>
    </section>

    <section id="reportsScreen" class="screen">
      <div class="topbar">
        <h2>Reports</h2>
        <button id="refreshReportsBtn" class="secondary">Refresh</button>
      </div>

      <div class="report-grid">
        <div class="metric card">
          <span>Total Evaluations</span>
          <strong id="totalEvaluations">0</strong>
        </div>
        <div class="metric card">
          <span>SLA Breaches</span>
          <strong id="totalBreaches">0</strong>
        </div>
        <div class="metric card">
          <span>Average Score</span>
          <strong id="averageScore">0</strong>
        </div>
      </div>

      <div class="card">
        <h3>Average by Agent</h3>
        <div id="agentReport"></div>
      </div>
    </section>

    <section id="settingsScreen" class="screen">
      <div class="topbar">
        <h2>Settings</h2>
      </div>

      <div class="card form-grid">
        <label>ServiceNow Instance
          <input id="serviceNowInstance" placeholder="example: yourinstance" />
        </label>

        <label>Default Evaluated By
          <input id="defaultEvaluator" placeholder="Your name" />
        </label>

        <div class="actions full">
          <button id="saveSettingsBtn">Save Settings</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
