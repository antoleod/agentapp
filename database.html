<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Evaluation — Database</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h2>Database</h2>
      <div class="toolbar">
        <input id="searchInput" placeholder="Search ticket, agent, LSA..." />
        <button id="exportJsonBtn" class="secondary">Export JSON</button>
        <label class="upload secondary">Import JSON<input id="importJsonInput" type="file" accept=".json" hidden /></label>
        <button id="deleteAllBtn" class="danger">Delete All</button>
      </div>
    </div>

    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticket</th>
            <th>Agent</th>
            <th>Date</th>
            <th>SLA</th>
            <th>LSA</th>
            <th>Assigned To</th>
            <th>Average</th>
            <th>Evaluated By</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="databaseBody"></tbody>
      </table>
    </div>
  </main>

  <script src="js/core.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/database.js"></script>
</body>
</html>
