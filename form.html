<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://apis.google.com 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE='; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src https://agentapp-8ea1c.firebaseapp.com;" />
  <title>Agent Evaluation — Form</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://apis.google.com" crossorigin />
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
  <link rel="stylesheet" href="assets/form.css?v=mquq0dfh">
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" aria-label="Loading application"><div class="spinner"></div></div>

  <div class="shell">
    <div class="app">
      <div class="page">

        <!-- Topbar -->
        <div class="topbar">
          <div>
            <h2 data-i18n="form.title">Evaluation Form</h2>
            <p style="color:var(--muted);font-size:13px;margin-top:3px" data-i18n="form.subtitle">Create or update an agent evaluation</p>
          </div>
          <div class="topbar-actions">
            <button type="button" id="pasteSnowBtn" class="btn btn-secondary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
              </svg>
              <span data-i18n="form.paste">Paste ServiceNow</span>
            </button>
            <button type="button" id="openSnowBtn" class="btn btn-secondary" data-i18n="form.open_sn">Open in ServiceNow</button>
            <button type="button" id="clearBtn" class="btn btn-ghost" data-i18n="form.clear">Clear</button>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-wrap">
          <div class="progress-header">
            <span id="progressLabel"></span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>
        </div>

        <form id="evaluationForm" aria-label="Agent evaluation form">
          <div class="card">

            <!-- ── Section 1: Ticket ── -->
            <div class="form-section">
              <div class="section-header">
                <span class="section-num">1</span>
                <div>
                  <div class="section-title" data-i18n="form.s1_title">Ticket Information</div>
                  <div class="section-sub" data-i18n="form.s1_sub">Main ticket and agent details</div>
                </div>
              </div>

              <div class="form-grid">
                <div class="form-group">
                  <label for="ticketNumber">
                    <span data-i18n="form.ticket">Ticket Number</span> <span class="req">*</span>
                    <span id="ticketBadge" class="ticket-badge" hidden></span>
                  </label>
                  <div class="input-with-action">
                    <input id="ticketNumber" required
                           data-i18n-ph="form.ticket_ph"
                           placeholder="INC / RITM / REQ / SCTASK…"
                           autocomplete="off" spellcheck="false" />
                    <button type="button" id="searchSnowBtn" class="input-action-btn"
                            aria-label="Open ticket in ServiceNow">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                      </svg>
                    </button>
                  </div>
                  <span class="field-hint" data-i18n="form.ticket_hint">Press Enter or click the icon to open in ServiceNow</span>
                </div>

                <div class="form-group">
                  <label for="agentName"><span data-i18n="form.agent">Agent Name</span> <span class="req">*</span></label>
                  <input id="agentName" required placeholder="Full name" list="agentRosterList" autocomplete="off" />
                  <datalist id="agentRosterList"></datalist>
                </div>

                <div class="form-row-compact">
                  <div class="form-group">
                    <label for="evaluationDate"><span data-i18n="form.date">Evaluation Date</span> <span class="req">*</span></label>
                    <input id="evaluationDate" type="date" required />
                  </div>

                  <div class="form-group">
                    <label data-i18n="form.sla">SLA Breach</label>
                    <div class="toggle-group" id="slaToggle">
                      <button type="button" class="toggle-btn active" data-value="No" data-i18n="form.sla_ok">✓ Within SLA</button>
                      <button type="button" class="toggle-btn toggle-danger" data-value="Yes" data-i18n="form.sla_breach">⚠ Breached</button>
                    </div>
                    <input type="hidden" id="slaBreach" value="No" />
                  </div>

                  <div class="form-group">
                    <label for="lsa" data-i18n="form.lsa">LSA / Support Area</label>
                    <input id="lsa" placeholder="Assignment group" />
                  </div>
                </div>

              </div>
            </div>

            <!-- ── Section 2: Scores (rendered dynamically by form.js) ── -->
            <div class="form-section">
              <div class="section-header">
                <span class="section-num">2</span>
                <div>
                  <div class="section-title" data-i18n="form.s2_title">Evaluation Scores</div>
                  <div class="section-sub" data-i18n="form.s2_sub">Click a number to score each criterion (1 = Poor, 5 = Excellent)</div>
                </div>
                <div class="avg-badge" id="avgBadge">Avg —</div>
              </div>
              <div class="score-criteria" id="scoreCriteria"></div>
            </div>

            <!-- ── Section 3: Notes ── -->
            <div class="form-section">
              <div class="section-header">
                <span class="section-num">3</span>
                <div>
                  <div class="section-title" data-i18n="form.s3_title">Notes</div>
                  <div class="section-sub" data-i18n="form.s3_sub">Additional context and evaluator</div>
                </div>
              </div>

              <div class="form-grid">
                <div class="form-group">
                  <label for="evaluatedBy" data-i18n="form.evaluated_by">Evaluated By</label>
                  <input id="evaluatedBy" placeholder="Your name" />
                </div>
                <div class="form-group full">
                  <label for="comments" data-i18n="form.comments">Comments</label>
                  <textarea id="comments" rows="2"
                            placeholder="Observations, follow-up actions, context…"></textarea>
                </div>
              </div>
            </div>

            <!-- ── Actions ── -->
            <div class="form-actions">
              <button type="submit" id="saveBtn" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px">
                  <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                  <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                <span data-i18n="form.save">Save Evaluation</span>
              </button>
              <button type="button" id="searchLocalBtn" class="btn btn-secondary" data-i18n="form.load">Load Saved Ticket</button>
            </div>
          </div>
        </form>

      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="assets/form.js?v=mquq0dfh"></script>
</body>
</html>
