<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Evaluation — Database</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/toast.css" />
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="shell">
    <div class="app">
      <div class="page">
        <div class="topbar">
          <div>
            <h2>Database</h2>
            <p style="color:var(--muted);font-size:13px;margin-top:3px">All saved evaluations</p>
          </div>
          <div class="topbar-actions">
            <div class="search-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input id="searchInput" class="search-input" placeholder="Search ticket, agent, LSA…" />
            </div>
            <button id="exportJsonBtn" class="btn btn-secondary">Export JSON</button>
            <label class="btn btn-secondary" style="cursor:pointer">
              Import JSON
              <input id="importJsonInput" type="file" accept=".json" hidden />
            </label>
            <button id="deleteAllBtn" class="btn btn-danger">Delete All</button>
          </div>
        </div>

        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Ticket</th>
                  <th>Agent</th>
                  <th>Date</th>
                  <th>SLA</th>
                  <th>LSA</th>
                  <th>Assigned To</th>
                  <th>Score</th>
                  <th>Evaluated By</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="databaseBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/core.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/pages/database.js"></script>
</body>
</html>
