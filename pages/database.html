<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://apis.google.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src https://agentapp-8ea1c.firebaseapp.com;" />
  <title>Agent Evaluation — Database</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/toast.css" />
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://apis.google.com" crossorigin />
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" aria-label="Loading application">
    <div class="spinner"></div>
  </div>

  <div class="shell">
    <div class="app">
      <div class="page">
        <div class="topbar">
          <div>
            <h2 data-i18n="db.title">Database</h2>
            <p style="color:var(--muted);font-size:13px;margin-top:3px" data-i18n="db.subtitle">All saved evaluations</p>
          </div>
          <div class="topbar-actions">
            <div class="search-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input id="searchInput" class="search-input" data-i18n-ph="db.search_ph" placeholder="Search ticket, agent, LSA…" />
            </div>

            <!-- Export dropdown -->
            <div class="dropdown" id="exportDropdown">
              <button class="btn btn-secondary dropdown-toggle" id="exportDropdownBtn" aria-haspopup="true" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:11px;height:11px;margin-left:2px"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="dropdown-menu" id="exportDropdownMenu" hidden>
                <button class="dropdown-item" id="exportPdfBtn" title="Export selected rows as PDF (or all if none selected)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/><polyline points="9 9 10 9"/></svg>
                  <span id="exportPdfLabel">Export PDF</span>
                </button>
                <button class="dropdown-item" id="exportJsonBtn" data-i18n="db.export_json">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                  Export JSON
                </button>
                <button class="dropdown-item" id="exportCsvBtn" data-i18n="db.export_csv">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M9 17l3 3 3-3"/><path d="M12 12v8"/><path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29"/></svg>
                  Export CSV
                </button>
                <div class="dropdown-divider"></div>
                <label class="dropdown-item" id="importJsonBtn" style="cursor:pointer">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  <span data-i18n="db.import_json">Import JSON</span>
                  <input id="importJsonInput" type="file" accept=".json" hidden />
                </label>
              </div>
            </div>

            <button id="auditLogBtn" class="btn btn-secondary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              <span>Audit Log</span>
            </button>
            <button id="deleteAllBtn" class="btn btn-danger" data-i18n="db.delete_all">Delete All</button>
          </div>
        </div>

        <div class="card">
          <div class="table-wrap">
            <table aria-label="Saved evaluations">
              <thead id="dbHead">
                <tr>
                  <th style="width:36px;text-align:center">
                    <input type="checkbox" id="selectAllRows" title="Select all visible rows" style="cursor:pointer">
                  </th>
                  <th data-i18n="db.col_ticket">Ticket</th>
                  <th data-i18n="db.col_agent">Agent</th>
                  <th data-i18n="db.col_date">Date</th>
                  <th data-i18n="db.col_sla">SLA</th>
                  <th data-i18n="db.col_lsa">LSA</th>
                  <!-- KPI columns injected by database.js -->
                  <th data-i18n="db.col_score">Avg</th>
                  <th data-i18n="db.col_evaluated">Evaluated By</th>
                  <th data-i18n="db.col_actions">Actions</th>
                </tr>
              </thead>
              <tbody id="databaseBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Import Preview Modal -->
  <div id="importPreviewModal" class="modal-overlay" hidden aria-modal="true" role="dialog">
    <div class="modal" style="max-width:760px;width:95%">
      <div class="modal-header">
        <h3 id="importPreviewTitle">Import Preview</h3>
        <button class="btn btn-ghost btn-icon" id="importPreviewClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding-bottom:0">
        <div id="importSummaryBar" class="import-summary-bar"></div>
        <div style="overflow-x:auto;max-height:360px;margin-top:14px;border:1px solid var(--border);border-radius:var(--r-md)">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead>
              <tr style="position:sticky;top:0;background:var(--panel);z-index:1">
                <th style="padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);width:32px">
                  <input type="checkbox" id="importSelectAll" title="Select all valid/warning rows">
                </th>
                <th style="padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);width:28px"></th>
                <th style="padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">Ticket</th>
                <th style="padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">Agent</th>
                <th style="padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">Date</th>
                <th style="padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">SLA</th>
                <th style="padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">Issues</th>
              </tr>
            </thead>
            <tbody id="importPreviewBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="importPreviewCancel">Cancel</button>
        <button class="btn btn-primary" id="importConfirmBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
          </svg>
          <span id="importConfirmLabel">Import 0 selected</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Audit Log Modal -->
  <div id="auditLogModal" class="modal-overlay" hidden aria-modal="true" role="dialog">
    <div class="modal" style="max-width:820px;width:95%">
      <div class="modal-header">
        <h3>Audit Log</h3>
        <button class="btn btn-ghost btn-icon" id="auditLogClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding-bottom:0">
        <div style="display:grid;grid-template-columns:1fr 1fr auto auto;gap:8px;margin-bottom:12px;align-items:end">
          <div>
            <label style="font-size:11px;font-weight:600;display:block;margin-bottom:3px;color:var(--muted)">From</label>
            <input type="date" id="auditDateFrom" style="width:100%">
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;display:block;margin-bottom:3px;color:var(--muted)">To</label>
            <input type="date" id="auditDateTo" style="width:100%">
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;display:block;margin-bottom:3px;color:var(--muted)">Action</label>
            <select id="auditActionFilter" style="padding:9px 10px">
              <option value="">All</option>
              <option value="create">Create</option>
              <option value="update">Update</option>
              <option value="delete">Delete</option>
              <option value="import">Import</option>
            </select>
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;display:block;margin-bottom:3px;color:var(--muted)">Agent / Ticket</label>
            <input type="text" id="auditSearch" placeholder="Search…" style="width:100%">
          </div>
        </div>
        <div id="auditEntriesList" style="max-height:420px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg)">
          <div class="empty-state" style="padding:32px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:32px;height:32px">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            <p>Loading audit log…</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="auditExportCsvBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export CSV
        </button>
        <button class="btn btn-secondary" id="auditLogCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Math confirm modal (Delete All) -->
  <div id="mathConfirmModal" class="modal-overlay" hidden aria-modal="true" role="dialog">
    <div class="modal" style="max-width:380px;width:95%">
      <div class="modal-header">
        <h3 style="color:var(--danger)">&#x26A0; Delete All Evaluations</h3>
        <button class="btn btn-ghost btn-icon" id="mathConfirmClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
        <p style="font-size:13px;color:var(--text-secondary)">This will permanently delete <strong id="mathConfirmCount">all</strong> evaluations. This cannot be undone.</p>
        <p style="font-size:13px;color:var(--text-secondary)">To confirm, solve this:</p>
        <p id="mathQuestion" style="font-size:24px;font-weight:700;text-align:center;letter-spacing:.05em;color:var(--text)"></p>
        <input id="mathAnswer" type="number" placeholder="Your answer" style="text-align:center;font-size:18px;font-weight:600" autocomplete="off" />
        <p id="mathError" style="color:var(--danger);font-size:12px;text-align:center;min-height:16px"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="mathConfirmCancel">Cancel</button>
        <button class="btn btn-danger" id="mathConfirmSubmit">Delete All</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" defer></script>

  <script src="../js/firebase-config.js" defer></script>
  <script src="../js/toast.js" defer></script>
  <script src="../js/core.js" defer></script>
  <script src="../js/i18n.js" defer></script>
  <script src="../js/sidebar.js" defer></script>
  <script src="../js/pages/database.js" defer></script>
</body>
</html>
