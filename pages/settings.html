<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Evaluation — Settings</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/toast.css" />
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="shell">
    <div class="app">
      <div class="page">
        <div class="topbar">
          <div>
            <h2>Settings</h2>
            <p style="color:var(--muted);font-size:13px;margin-top:3px">Configure application preferences</p>
          </div>
        </div>

        <div style="display:grid;gap:20px;max-width:700px">

          <!-- App settings -->
          <div class="card">
            <div class="card-header">
              <h3 style="font-size:15px">Application</h3>
            </div>
            <div class="card-body">
              <div class="form-grid">
                <div class="form-group full">
                  <label for="serviceNowInstance">ServiceNow Instance URL</label>
                  <input id="serviceNowInstance" placeholder="e.g. yourinstance.service-now.com" />
                </div>
                <div class="form-group full">
                  <label for="defaultEvaluator">Default Evaluated By</label>
                  <input id="defaultEvaluator" placeholder="Your name (pre-fills the form)" />
                </div>
              </div>
            </div>
          </div>

          <!-- Account -->
          <div class="card" id="userInfoSection">
            <div class="card-header">
              <h3 style="font-size:15px">Account</h3>
            </div>
            <div class="card-body">
              <div class="form-grid">
                <div class="form-group">
                  <label>Email</label>
                  <input id="currentUserEmail" readonly style="background:var(--bg);color:var(--text-secondary)" />
                </div>
                <div class="form-group">
                  <label>User ID</label>
                  <input id="currentUid" readonly style="background:var(--bg);color:var(--muted);font-size:12px" />
                </div>
                <div class="form-group">
                  <label>Default Login Email</label>
                  <input id="loginEmail" placeholder="Stored locally" />
                </div>
              </div>
              <div style="margin-top:16px">
                <button id="changePasswordBtn" class="btn btn-secondary">Send Password Reset Email</button>
              </div>
            </div>
          </div>

          <!-- Save -->
          <div style="display:flex;gap:10px">
            <button id="saveSettingsBtn" class="btn btn-primary">Save Settings</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/core.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/pages/settings.js"></script>
</body>
</html>
