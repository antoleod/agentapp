<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- El color principal hereda del tema via currentColor (CSS) -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="currentColor" />
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.8" />
    </linearGradient>
    
    <!-- Efecto de brillo de cristal (Glassmorphism) para el acabado Premium -->
    <linearGradient id="glass-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5" />
      <stop offset="50%" stop-color="white" stop-opacity="0.05" />
      <stop offset="100%" stop-color="white" stop-opacity="0.2" />
    </radialGradient>
    
    <!-- Sombra de elevación para dar profundidad -->
    <filter id="premium-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Escudo Base (Hexágono minimalista adaptativo) -->
  <path d="M24 2 L44 13 V35 L24 46 L4 35 V13 Z" fill="url(#brand-grad)" />
  
  <!-- Capa Prisma (Brillo de cristal) -->
  <path d="M24 2 L44 13 V35 L24 46 L4 35 V13 Z" fill="url(#glass-shine)" />
  
  <!-- Contornos de cristal blancos (Garantizan visibilidad en cualquier fondo) -->
  <path d="M24 2 L44 13 V35 L24 46 L4 35 V13 Z" fill="none" stroke="white" stroke-opacity="0.4" stroke-width="1.2" />
  <path d="M24 2 V46 M4 13 L44 35 M44 13 L4 35" stroke="white" stroke-opacity="0.1" stroke-width="0.5" />

  <!-- Símbolo Central: Checkmark dinámico de alta definición -->
  <path d="M14 26 L22 34 L36 15" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#premium-shadow)"/>
</svg>
