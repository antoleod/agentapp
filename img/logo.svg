<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- 3 bold bars: clearly visible at any size -->
  <rect x="7"  y="30" width="8" height="11" rx="2.5" fill="white" opacity=".5"/>
  <rect x="20" y="22" width="8" height="19" rx="2.5" fill="white" opacity=".75"/>
  <rect x="33" y="13" width="8" height="28" rx="2.5" fill="white"/>
  <!-- Bold checkmark over top of rightmost bar -->
  <path d="M14 25 L21 32 L38 13" stroke="white" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
