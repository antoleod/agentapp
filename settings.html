<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Evaluation — Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h2>Settings</h2>
    </div>

    <div class="card form-grid">
      <label>ServiceNow Instance
        <input id="serviceNowInstance" placeholder="e.g. yourinstance.service-now.com" />
      </label>

      <label>Default Evaluated By
        <input id="defaultEvaluator" placeholder="Your name" />
      </label>

      <label>Login Username
        <input id="loginUsername" placeholder="admin" />
      </label>

      <label>Login Password
        <input id="loginPassword" type="password" placeholder="admin" />
      </label>

      <div class="actions full">
        <button id="saveSettingsBtn">Save Settings</button>
      </div>
    </div>
  </main>

  <script src="js/core.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
